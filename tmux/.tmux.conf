# Set true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Set prefix to Ctrl-a (keep Ctrl-b as secondary)
set -g prefix C-a
set -g prefix2 C-b
bind C-a send-prefix
# Enable mouse
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Vim style pane navigation (via vim-tmux-navigator)
# Smart pane switching with awareness of Vim splits
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Vi mode for copy
setw -g mode-keys vi

# ---- Plugins ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-processes ':all:'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'catppuccin/tmux'

# ---- Catppuccin config ----
set -g @catppuccin_pane_border_style "fg=#{@thm_overlay_0}"
set -g @catppuccin_pane_active_border_style "##{?pane_in_mode,fg=#{@thm_lavender},##{?pane_synchronized,fg=#{@thm_mauve},fg=#{@thm_lavender}}}"
set -g @catppuccin_flavor 'macchiato' # options: latte, frappe, macchiato, mocha
set -g @catppuccin_window_status_style "slanted"
# set -g window-status-separator ""
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_middle_separator "#[reverse]#[fg=#363a4f]#[noreverse]"
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_connect_separator "yes"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_number "#I"
set -g @catppuccin_window_current_text_color "#{@thm_surface_1}"
set -g @catppuccin_window_current_number_color "#{@thm_mauve}"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_window_current_number "#I"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_flags "none" # none, icon, or text

# ---- Icon padding (add leading space before each icon) ----
set -g @catppuccin_application_icon "  "
set -g @catppuccin_cpu_icon "  "
set -g @catppuccin_session_icon "  "
set -g @catppuccin_battery_icon " #{l:#{battery_icon}} "
set -g @catppuccin_date_time_icon " 󰃰 "
# Load catppuccin via source (synchronous, so variables are available immediately)
source -F "#{d:current_file}/.tmux/plugins/tmux/catppuccin_options_tmux.conf"
source -F "#{d:current_file}/.tmux/plugins/tmux/catppuccin_tmux.conf"

# ---- Force all window separators to slanted (no gaps) ----
set -g window-status-separator ""

# ---- Custom git branch module ----
set -g @catppuccin_git_icon " "
set -gF @catppuccin_git_color "#{E:@thm_mauve}"
set -g @catppuccin_git_text " #(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null)"
%hidden MODULE_NAME="git"
source -F "#{d:current_file}/.tmux/plugins/tmux/utils/status_module.conf"

# ---- Rebuild directory module with shell command (so it updates dynamically) ----
set -g @catppuccin_directory_text " #(echo #{pane_current_path} | rev | cut -d/ -f1-2 | rev)"
%hidden MODULE_NAME="directory"
source -F "#{d:current_file}/.tmux/plugins/tmux/utils/status_module.conf"

# ---- Fix application module (claude shows version as process name) ----
set -g @catppuccin_application_text " ##{?##{m:*.*.*,##{pane_current_command}},claude,##{?##{m:codex-*,##{pane_current_command}},codex,##{pane_current_command}}}"

# ---- Date/time format ----
set -g @catppuccin_date_time_text " %a %d %b"


# ---- Status bar (use -gF to expand catppuccin templates at set-time,
#      so tmux-cpu/battery/online plugins can find their placeholders) ----
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{?@vim_mode,#{@vim_mode},#[bg=#585b70]#[fg=#1e2030]#[bold] ZSH #[default]#[fg=#585b70]#[default]}"
set -agF status-left "#{E:@catppuccin_status_git}"
# --- Right
set -g status-right "#{E:@catppuccin_status_directory}"
set -agF status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{E:@catppuccin_status_date_time}"
set -agF status-right "#{E:@catppuccin_status_online}"

# ---- Initialize TPM (keep at the bottom, runs after status-right is expanded) ----
run '~/.tmux/plugins/tpm/tpm'
