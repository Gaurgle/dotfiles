# Start JankyBorders on launch for visual window focus feedback
after-startup-command = [
  'exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=5.0'
]

start-at-login = true

# Normalization keeps the window tree clean
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus across monitors
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Prevent accidental cmd-h hiding apps (common annoyance with tiling WMs)
automatically-unhide-macos-hidden-apps = true

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 1
    inner.vertical =   1
    outer.left =       1
    outer.bottom =     1
    outer.top =        1
    outer.right =      1

# ──────────────────────────────────────────────
# MAIN BINDINGS — All use Alt (Option)
# ──────────────────────────────────────────────
[mode.main.binding]

    # Layout toggles
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    # Vim-style focus (h/j/k/l)
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # Move windows (add Shift)
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # Resize
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # Numbered workspaces (0-9)
    alt-0 = 'workspace 0'
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'

    # Named workspaces (mirrors Raycast hyper key bindings)
    alt-a = 'workspace a'   # Android Studio
    alt-i = 'workspace i'   # IntelliJ IDEA
    alt-s = 'workspace s'   # Sublime Text
    alt-f = 'workspace f'   # Browser (Brave)
    alt-d = 'workspace d'   # Ghostty (terminal)

    # Move window to workspace (add Shift)
    alt-shift-0 = 'move-node-to-workspace 0'
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'
    alt-shift-a = 'move-node-to-workspace a'
    alt-shift-i = 'move-node-to-workspace i'
    alt-shift-s = 'move-node-to-workspace s'
    alt-shift-f = 'move-node-to-workspace f'
    alt-shift-d = 'move-node-to-workspace d'

    # Workspace navigation
    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # Window management
    alt-w = 'close'
    alt-enter = 'exec-and-forget open -na ghostty'

    # Disable macOS hide (conflicts with tiling)
    cmd-h = []

    # Join windows into containers (like i3 grouping)
    alt-cmd-h = 'join-with left'
    alt-cmd-j = 'join-with down'
    alt-cmd-k = 'join-with up'
    alt-cmd-l = 'join-with right'

    # Config reload
    alt-esc = [ 'reload-config', 'mode main' ]

    # Enter service mode
    alt-shift-semicolon = 'mode service'

# ──────────────────────────────────────────
# SERVICE MODE — Layout resets, volume, etc.
# ──────────────────────────────────────────
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']        # Reset layout
    f = ['layout floating tiling', 'mode main']        # Toggle float
    down = 'volume down'
    up = 'volume up'
    shift-down = ['volume set 0', 'mode main']
    alt-esc = [ 'reload-config', 'mode main' ]
