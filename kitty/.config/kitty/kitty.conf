# BEGIN_KITTY_THEME
# Dimmed Monokai
include current-theme.conf

# window size:
initial_window_width 120c
initial_window_height 50c

# optn & cmnd jump/delete:
map alt+left send_text all \x1bb
map alt+right send_text all \x1bf

map super+left send_text all \x81
map super+right send_text all \x05

map super+backspace send_text all \x15

# END_KITTY_THEME
